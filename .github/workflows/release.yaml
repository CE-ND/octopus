name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write
  
jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
    
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build
        run: bash scripts/build.sh release

      - name: Get latest tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/archives/*
          prerelease: false
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}

      - name: Docker meta (Debian)
        id: meta-debian
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.TAG_NAME }}

      - name: Docker meta (Alpine)
        id: meta-alpine
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest-alpine
            type=raw,value=${{ steps.tag.outputs.TAG_NAME }}-alpine

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (Alpine)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/dockerfiles/Dockerfile.alpine
          push: true
          platforms: linux/amd64,linux/i386,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-alpine.outputs.tags }}
          labels: ${{ steps.meta-alpine.outputs.labels }}
          build-args: |
            TARGETPLATFORM

      - name: Build and push (Debian)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/dockerfiles/Dockerfile.debian
          push: true
          platforms: linux/amd64,linux/i386,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-debian.outputs.tags }}
          labels: ${{ steps.meta-debian.outputs.labels }}
          build-args: |
            TARGETPLATFORM

  desktop-macos:
    name: desktop-macos-${{ matrix.electron_arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - electron_arch: arm64
            goarch: arm64
          - electron_arch: x64
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare desktop assets
        env:
          OCTOPUS_DESKTOP_GOOS: darwin
          OCTOPUS_DESKTOP_GOARCH: ${{ matrix.goarch }}
        run: pnpm desktop:prepare

      - name: Build unsigned DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --mac dmg --${{ matrix.electron_arch }} --publish never

      - name: Generate checksum
        run: |
          dmg_file=$(find dist/desktop -maxdepth 1 -name 'Octopus-*-mac-${{ matrix.electron_arch }}.dmg' -print -quit)
          test -n "$dmg_file"
          shasum -a 256 "$dmg_file" > "${dmg_file}.sha256"

      - name: Get latest tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "TAG_NAME=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Upload macOS desktop release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/desktop/*.dmg
            dist/desktop/*.dmg.sha256
          prerelease: false
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
